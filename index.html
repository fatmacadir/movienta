<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movienta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="posterWall" class="poster-wall"></div>
  <div class="dark-overlay"></div>
  
  <header class="navbar">
    <div class="logo">Movienta</div>

    <nav>
      <a href="#" class="active" onclick="loadPopularMovies()">Ana Sayfa</a>

      <div class="dropdown">
        <button class="dropdown-btn">Kategoriler ▾</button>
        <div class="dropdown-menu">
          <button onclick="loadMoviesByGenre(28, 'Aksiyon')">Aksiyon</button>
          <button onclick="loadMoviesByGenre(35, 'Komedi')">Komedi</button>
          <button onclick="loadMoviesByGenre(18, 'Dram')">Dram</button>
          <button onclick="loadMoviesByGenre(27, 'Korku')">Korku</button>
          <button onclick="loadMoviesByGenre(10749, 'Romantik')">Romantik</button>
          <button onclick="loadMoviesByGenre(878, 'Bilim Kurgu')">Bilim Kurgu</button>
          <button onclick="loadMoviesByGenre(14, 'Fantastik')">Fantastik</button>
          <button onclick="loadMoviesByGenre(16, 'Animasyon')">Animasyon</button>
          <button onclick="loadMoviesByGenre(99, 'Belgesel')">Belgesel</button>
          <button onclick="loadMoviesByGenre(53, 'Gerilim')">Gerilim</button>
      </div>
      </div>

      <a href="#" onclick="showFavorites()">Favoriler</a>
      <a href="#about">Hakkında</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h1>Movienta</h1>
      <p>Search for a movie and see its basic information.</p>

      <div class="search-box">
        <input type="text" id="movieInput" placeholder="Enter a movie name..." />

        <select id="language">
          <option value="tr-TR">Türkçe</option>
          <option value="en-US">English</option>
          <option value="de-DE">Deutsch</option>
          <option value="es-ES">Español</option>
        </select>

        <button onclick="searchMovie()">Search</button>
      </div>

      <p id="message"></p>
      <div id="loader" class="loader hidden"></div>
    </div>
  </section>

  <main class="main-content">
    <section class="movies-section">
      <h2 id="sectionTitle">Popüler Filmler</h2>
      <div id="movieCard" class="movie-card"></div>
    </section>

    <section id="about" class="about">
      <h2>Hakkında</h2>
      <p>
        Movienta, kullanıcıların film araması yapabildiği, popüler filmleri inceleyebildiği
        ve favori filmlerini kaydedebildiği bir film keşif platformudur.
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
