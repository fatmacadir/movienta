<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movienta</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div id="posterWall" class="poster-wall"></div>
  <div class="dark-overlay"></div>
  
  <header class="navbar">
    <div class="logo">Movienta</div>

    <nav>
      <a id="homeText" href="index.html" class="active">Ana Sayfa</a>
    
      <div class="dropdown">
        <button id="categoryText" class="dropdown-btn">Kategoriler ▾</button>
    
        <div class="dropdown-menu">
          <a id="genreAction" href="categories.html?genre=28">Aksiyon</a>
          <a id="genreComedy" href="categories.html?genre=35">Komedi</a>
          <a id="genreDrama" href="categories.html?genre=18">Dram</a>
          <a id="genreHorror" href="categories.html?genre=27">Korku</a>
          <a id="genreRomance" href="categories.html?genre=10749">Romantik</a>
          <a id="genreSciFi" href="categories.html?genre=878">Bilim Kurgu</a>
          <a id="genreFantasy" href="categories.html?genre=14">Fantastik</a>
          <a id="genreAnimation" href="categories.html?genre=16">Animasyon</a>
          <a id="genreDocumentary" href="categories.html?genre=99">Belgesel</a>
          <a id="genreThriller" href="categories.html?genre=53">Gerilim</a>
        </div>
      </div>
    
      <a id="favoriteText" href="favorites.html">Favoriler</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h1>Movienta</h1>
      <p id="subtitle">Search for a movie and see its basic information.</p>

      <div class="search-box">
        <input type="text" id="movieInput" placeholder="Enter a movie name..." />

        <select id="language">
          <option value="tr-TR">Türkçe</option>
          <option value="en-US">English</option>
          <option value="de-DE">Deutsch</option>
          <option value="es-ES">Español</option>
        </select>

        <button id="searchBtn" onclick="searchMovie()">Search</button>
      </div>

      <p id="message"></p>
      <div id="loader" class="loader hidden"></div>
    </div>
    
    <div class="scroll-down" onclick="scrollToMovies()"></div>
    
  </section>

  <main class="main-content">
    <section class="movies-section">
      <h2 id="sectionTitle">Popüler Filmler</h2>
      <div id="movieCard" class="movie-card"></div>
    </section>

    <section class="movies-section upcoming-section">
      <h2 id="upcomingTitle">Yakında Çıkacak Filmler</h2>
      <div id="upcomingMovies" class="movie-card"></div>
    </section>

    <section class="home-about" id="homeAbout">
      <h2 id="homeAboutTitle">Movienta Hakkında</h2>
    
      <p id="homeAboutText1"></p>
      <p id="homeAboutText2"></p>
      <p id="homeAboutText3"></p>
    
      <p class="copyright" id="homeAboutCopyright"></p>
    </section>
    
  </main>

  <div id="toast"></div>
  <script src="translation.js"></script>
  <script src="script.js"></script>
</body>
</html>
